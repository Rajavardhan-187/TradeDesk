[build]
  command = "node -e \"const fs=require('fs');const path=require('path');if(!fs.existsSync('src/App.jsx')&&fs.existsSync('App.jsx')){fs.mkdirSync('src',{recursive:true});fs.copyFileSync('App.jsx','src/App.jsx');console.log('Copied App.jsx to src/');}if(!fs.existsSync('src/main.jsx')&&fs.existsSync('main.jsx')){fs.copyFileSync('main.jsx','src/main.jsx');console.log('Copied main.jsx to src/');}\" && npm install && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
